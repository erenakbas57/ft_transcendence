<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong - {% block title%} {% endblock%}</title>
    {% load static %}
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>   
    

    <link rel="stylesheet" href="{% static "css/index.css" %}">
    <link rel="stylesheet" href="{% static "css/navbar.css" %}">

    <script src="{% static 'js/pages/search.js' %}"></script>
    <script src="{% static 'js/pages/profileEdit.js' %}"></script>
    <script src="{% static 'js/pages/logout.js' %}"></script>
    <script src="{% static 'js/pages/login.js' %}"></script>
    <script src="{% static 'js/pages/friends.js' %}"></script>
    <script src="{% static 'js/pages/register.js' %}"></script>
    <script src="{% static 'js/pages/passwordChange.js' %}"></script>
    <script type="module" src="{% static 'js/navigate.js' %}"></script>
    <script src="{% static 'js/rps/rps_ai.js'%}"></script>

    <style>
        .alert {
          font-size:15px;
          position: fixed;
          bottom: 20px;
          right: 20px;
          min-width: 250px;
          color: black;
          padding: 15px;
          border-radius: 5px;
          text-align: center;
          z-index: 1000;
        }
        @font-face {
            font-family: 'YourFont';
            src: url("{% static 'css/fonts/OCRA.ttf' %}") format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        html, body {
            height: 100%; /* Tüm sayfa yüksekliği için */
            margin: 0;
            padding: 0;
            background-color: #000000;
            background-image: radial-gradient(#11581E, #041607);
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed; /* Gradyanı sabitler */
            font-family: 'YourFont', sans-serif;
            color: #00FF41;
        }

    </style>

    {% block stylesheet %}
    
    {% endblock %}

</head>
<body>
    
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible d-flex align-items-center justify-content-between" role="alert" >
                <span>{{ message }}</span>
                <button type="button" class="btn-close ms-2" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {% endfor %}
    {% endif %}


    <!-- Navbar -->
    {% if not is_error_page %}
        {% include '_nav.html' %}
    {% endif %}

    <div id="content" class="container">
        {% block content %}
        {% endblock %}
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const errorElement = document.getElementById('error'); // "ERROR" için
            const errorDescElement = document.getElementById('error-desc'); // Açıklama için
            const errorDesc2Element = document.getElementById('error-desc2'); // Açıklama için

            const errorDesc = "> matrıx could not find this page";
            const errorText = "> ERROR 404";
            const errorDesc2 = "> follow the white rabbit";
        
            function sleep(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }
        
            async function typeText(text, element) {
                for (let i = 0; i < text.length; i++) {
                    element.textContent += text[i];
                    await sleep(50); // Her bir harf için 80ms bekle
                }
            }
        
            // İlk olarak "ERROR" yaz
            async function startTyping() {
                await typeText(errorText, errorElement);
                await typeText(errorDesc, errorDescElement);
                await typeText(errorDesc2, errorDesc2Element); 
            }
        
            startTyping(); // Yazma işlemini başlat
        });
        
    
    </script> 

    
</body>
</html>
